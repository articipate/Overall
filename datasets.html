<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overall - Datasets</title>
  <link rel="icon" type="image/png" href="Logos/Overall_Small_Logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <img src="Logos/Overall_Small_Logo.png" alt="Overall">
      <div class="navbar-brand-text">
        <span>OVERALL</span>
        <small class="navbar-powered">Powered by <a href="https://huggingface.co" target="_blank">Hugging Face</a></small>
      </div>
    </a>
    <div class="navbar-links">
      <a href="models.html"><img src="Icons/Pages/Overall_Models_Icon.png" class="nav-icon"><span data-i18n="nav_models">MODELS</span></a>
      <a href="datasets.html"><img src="Icons/Pages/Overall_Datasets_Icon.png" class="nav-icon"><span data-i18n="nav_datasets">DATASETS</span></a>
      <a href="developer.html"><img src="Icons/Pages/Overall_Developer_Bag_Icon.png" class="nav-icon"><span data-i18n="nav_developer">DEVELOPER BAG</span></a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 data-i18n="datasets_title">DATASETS</h1>
      <p data-i18n="datasets_desc">Hugging Face datasetlerini arayin ve filtreleyin</p>
    </div>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="search-input" data-i18n="search_datasets" placeholder="Dataset ara... (ornek: text, image, audio)">
      </div>
      <div class="filter-group">
        <select id="task-filter" class="filter-select">
          <option value="" data-i18n="all_tasks">Tum Gorevler</option>
          <option value="text-classification" data-i18n="task_text_classification">Text Classification</option>
          <option value="text-generation" data-i18n="task_text_generation">Text Generation</option>
          <option value="question-answering" data-i18n="task_question_answering">Question Answering</option>
          <option value="summarization" data-i18n="task_summarization">Summarization</option>
          <option value="translation" data-i18n="task_translation">Translation</option>
          <option value="image-classification" data-i18n="task_image_classification">Image Classification</option>
          <option value="object-detection" data-i18n="task_object_detection">Object Detection</option>
          <option value="speech-recognition" data-i18n="task_speech_recognition">Speech Recognition</option>
          <option value="token-classification">Token Classification</option>
          <option value="conversational" data-i18n="task_conversational">Conversational</option>
          <option value="fill-mask" data-i18n="task_fill_mask">Fill Mask</option>
        </select>
        <select id="sort-filter" class="filter-select">
          <option value="downloads" data-i18n="most_downloaded">En Cok Indirilen</option>
          <option value="likes" data-i18n="most_liked">En Cok Begenilen</option>
          <option value="lastModified" data-i18n="last_updated">Son Guncellenen</option>
        </select>
      </div>
    </div>

    <div id="datasets-container"></div>

    <div class="pagination">
      <button id="prev-btn" disabled data-i18n="prev">ONCEKI</button>
      <span id="page-info" style="padding:8px 16px;font-size:8px">Sayfa 1</span>
      <button id="next-btn" data-i18n="next">SONRAKI</button>
    </div>
  </div>

  <footer class="footer" data-i18n-html="footer">
    OVERALL &copy; 2026 | Veriler Hugging Face API ile cekilmektedir
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/datasets.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
